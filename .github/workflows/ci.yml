name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Reusable — release.yml calls this workflow as a quality gate before
  # GoReleaser runs, so a failing lint/test/vuln check blocks a release
  # at the tagged SHA instead of producing a half-published state.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install tools via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          experimental: true

      - name: Download modules
        run: go mod download

      - name: Lint install.sh
        run: shellcheck -s sh docs/install.sh docs/install.test.sh

      - name: Smoke-test install.sh
        run: sh docs/install.test.sh

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: gosec
        # Exclusions mirror `task lint` in Taskfile.yml; each code is
        # justified there. Keep the two lists in sync when editing.
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet -exclude-dir=testdata \
            -exclude=G104,G115,G301,G302,G306,G304,G401,G501,G505,G204,G704 \
            ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        # -race runs the full suite; seed-corpus fuzz targets replay as
        # regular tests inside this call, so `task fuzz` is covered
        # implicitly. Heavy `task fuzz-deep` stays local/manual.
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Build
        run: go build ./...

      - name: Upload coverage
        # Upload only from Linux to avoid two identical coverage artifacts.
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn
