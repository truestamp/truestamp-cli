# Truestamp CLI Configuration
#
# Location:
#   macOS/Linux: ~/.config/truestamp/config.toml
#   Windows:     %APPDATA%\truestamp\config.toml
#
# Override order (highest priority last):
#   1. This config file
#   2. Environment variables (TRUESTAMP_ prefix)
#   3. Command-line flags

# Base URL of the Truestamp API
# Env: TRUESTAMP_API_URL
api_url = "https://www.truestamp.com/api/json"

# API key for authenticating with the Truestamp API
# Env: TRUESTAMP_API_KEY
api_key = ""

# Team ID for multi-tenant API operations (defaults to personal team if empty)
# Env: TRUESTAMP_TEAM
team = ""

# URL of the Truestamp keyring endpoint
# Env: TRUESTAMP_KEYRING_URL
keyring_url = "https://www.truestamp.com/.well-known/keyring.json"

# HTTP timeout for external API calls (Go duration: "10s", "30s", "1m")
# Env: TRUESTAMP_HTTP_TIMEOUT
http_timeout = "10s"

# Absolute path to the cosign binary used by `truestamp upgrade` for
# release-artifact signature verification. Empty (default) means "use
# $PATH lookup"; set this to pin cosign to a known install in hardened
# environments and avoid $PATH hijacking. Must be absolute if set.
# Env: TRUESTAMP_COSIGN_PATH
cosign_path = ""

[verify]
# No output, exit code only
# Env: TRUESTAMP_VERIFY_SILENT
silent = false

# Output results as JSON
# Env: TRUESTAMP_VERIFY_JSON
json = false

# Skip all external API verification (keyring, Stellar, Bitcoin)
# Env: TRUESTAMP_VERIFY_SKIP_EXTERNAL
skip_external = false

# Skip signing key and signature verification
# Env: TRUESTAMP_VERIFY_SKIP_SIGNATURES
skip_signatures = false

# Verify via server API instead of local computation (requires api_key)
# Env: TRUESTAMP_VERIFY_REMOTE
remote = false

[hash]
# Default algorithm for `truestamp hash`
# Env: TRUESTAMP_HASH_ALGORITHM
algorithm = "sha256"

# Default digest encoding: hex, base64, base64url
# Env: TRUESTAMP_HASH_ENCODING
encoding = "hex"

# Default output style: gnu (sha256sum-compatible), bsd, bare
# Env: TRUESTAMP_HASH_STYLE
style = "gnu"

[convert]
# Default IANA time zone for `truestamp convert time` and `convert id`
# (override with --to-zone). Accepts UTC, Local, or any IANA name.
# Env: TRUESTAMP_CONVERT_TIME_ZONE
time_zone = "UTC"
