# GoReleaser configuration for truestamp-cli.
# Reference: https://goreleaser.com/customization/
#
# Prerequisites for a real release (run from CI):
#   - GITHUB_TOKEN               Automatically provided to actions/checkout.
#   - HOMEBREW_TAP_GITHUB_TOKEN  Fine-grained PAT scoped to truestamp/homebrew-tap
#                                only, with `Contents: Read and write`. Do NOT use
#                                a classic `repo`-scoped PAT — the release pipeline
#                                only needs to push one file to one repo.
#   - OIDC token                 For keyless cosign signing. The release workflow
#                                must grant `id-token: write` permission so
#                                GoReleaser can mint one via the GitHub OIDC
#                                provider (`https://token.actions.githubusercontent.com`).
#
# Local dry-run (no publish, no network, signing skipped):
#   goreleaser release --snapshot --clean --skip=sign,publish

version: 2

project_name: truestamp-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: truestamp
    main: ./cmd/truestamp
    binary: truestamp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w
      - -X github.com/truestamp/truestamp-cli/internal/version.Version={{.Version}}
      - -X github.com/truestamp/truestamp-cli/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/truestamp/truestamp-cli/internal/version.BuildDate={{.Date}}
      - -X github.com/truestamp/truestamp-cli/internal/version.BuildYear={{.Now.Format "2006"}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README*
      - LICENSE*
      - CHANGELOG*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.sbom.json"

signs:
  - id: checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: truestamp
    name: truestamp-cli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## truestamp-cli {{ .Version }}

    Install:

    ```
    go install github.com/truestamp/truestamp-cli/cmd/truestamp@{{ .Tag }}
    brew install truestamp/tap/truestamp-cli
    ```

homebrew_casks:
  - name: truestamp-cli
    binaries:
      - truestamp
    repository:
      owner: truestamp
      name: homebrew-tap
      branch: goreleaser-{{ .Version }}
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          branch: main
    directory: Casks
    homepage: https://truestamp.com
    description: "Truestamp CLI — tools for cryptographic timestamping"
    commit_author:
      name: truestamp-bot
      email: bot@truestamp.com
    caveats: |
      The truestamp binary is not yet signed with an Apple Developer ID,
      so macOS Gatekeeper will block it on first run ("truestamp" Not
      Opened). Clear the quarantine attribute once after install or
      upgrade to avoid the prompt:

        xattr -cr #{staged_path}

      (Signed and notarised builds are on the roadmap.)
    # NOTE: shell completions are intentionally not generated at install
    # time. The cask binary is not yet signed/notarised, so macOS
    # Gatekeeper kills the binary when Brew tries to run
    # `truestamp completion <shell>`. Users can generate completions
    # manually once (Gatekeeper clears the quarantine bit after the first
    # successful run):
    #   truestamp completion bash > $(brew --prefix)/etc/bash_completion.d/truestamp
    #   truestamp completion zsh  > "${fpath[1]}/_truestamp"
    #   truestamp completion fish > ~/.config/fish/completions/truestamp.fish
    # Re-enable generate_completions_from_executable here once the binary
    # is signed and notarised.
